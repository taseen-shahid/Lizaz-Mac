name: Build macOS DMG

on:
  push:
    branches:
      - main

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install

      - run: npx electron-builder --mac dmg --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: dist/*.dmg
