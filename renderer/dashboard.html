<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
<script type="module">
  import { db, ref, onValue } from '../firebase.js';

  // ------------------- DOM elements -------------------
  const availableEl = document.getElementById('availableCount');
  const onthewayEl = document.getElementById('onthewayCount');
  const ontheportEl = document.getElementById('ontheportCount');
  const reservedEl = document.getElementById('reservedCount');
  const repossessedEl = document.getElementById('repossessedCount');
  const vehiclesRef = ref(db, 'vehicles');
  
  let allVehiclesCache = {};
  let vehicleArrayCache = [];
  let availableChart, onthewayChart, ontheportChart, reservedChart, repossessedChart;

  // ----- Hidden export elements -----
  const hiddenExportBtn = document.getElementById('hiddenExportBtn');
  const exportPopup = document.getElementById('exportPasswordPopup');
  const exportPasswordInput = document.getElementById('exportPasswordInput');
  const exportPasswordError = document.getElementById('exportPasswordError');
  const submitExport = document.getElementById('submitExportPassword');
  const cancelExport = document.getElementById('cancelExportPassword');
  const REQUIRED_PASSWORD = '0808';

  // ----- Helper: normalize status (includes ontheport, ontheway, available, reserved, repossessed, sold)
  function getNormalizedStatus(vehicle) {
    const status = (vehicle.status || 'available').toString().trim().toLowerCase();
    if (status === 'pending' || status === 'on the way' || status === 'ontheway' || status === 'on_the_way') return 'ontheway';
    if (status === 'ontheport' || status === 'on the port' || status === 'on_port' || status === 'onport') return 'ontheport';
    if (status === 'reserved') return 'reserved';
    if (status === 'repossessed') return 'repossessed';
    if (status === 'sold') return 'sold';
    return 'available';
  }

  function formatDisplayDate(raw) {
    if (!raw) return '';
    if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) {
      const d = new Date(raw);
      if (!isNaN(d.getTime())) {
        const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
        return `${String(d.getDate()).padStart(2,'0')} ${months[d.getMonth()]} ${String(d.getFullYear()).slice(2)}`;
      }
    }
    const parsed = new Date(raw);
    if (!isNaN(parsed.getTime())) {
      const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
      return `${String(parsed.getDate()).padStart(2,'0')} ${months[parsed.getMonth()]} ${String(parsed.getFullYear()).slice(2)}`;
    }
    return String(raw).toUpperCase();
  }

  function showAlert(message, title = "Alert") {
    return new Promise(resolve => {
      const alertDiv = document.getElementById('customAlert');
      const titleSpan = document.getElementById('alertTitle');
      const msgSpan = document.getElementById('alertMessage');
      const okBtn = document.getElementById('alertOkButton');
      titleSpan.innerText = title;
      msgSpan.innerText = message;
      alertDiv.style.display = 'flex';
      const closeHandler = () => {
        alertDiv.style.display = 'none';
        okBtn.removeEventListener('click', closeHandler);
        resolve();
      };
      okBtn.addEventListener('click', closeHandler, { once: true });
      alertDiv.addEventListener('click', (e) => { if(e.target === alertDiv) closeHandler(); }, { once: true });
    });
  }

  // ---------- CHART RENDER with improved fonts ----------
  function renderStatusChart(ctx, vehiclesData, targetStatus, titleLabel, barColor) {
    const modelCount = {};
    Object.values(vehiclesData).forEach(v => {
      const norm = getNormalizedStatus(v);
      let match = false;
      if (targetStatus === 'available' && norm === 'available') match = true;
      else if (targetStatus === 'reserved' && norm === 'reserved') match = true;
      else if (targetStatus === 'repossessed' && norm === 'repossessed') match = true;
      else if (targetStatus === 'ontheway' && norm === 'ontheway') match = true;
      else if (targetStatus === 'ontheport' && norm === 'ontheport') match = true;
      if (match) {
        const modelName = v.model || 'Unknown';
        const ccValue = v.cc || v.ccValue || v.engine_cc || 'N/A';
        const key = `${modelName} (${ccValue})`;
        modelCount[key] = (modelCount[key] || 0) + 1;
      }
    });
    const labels = Object.keys(modelCount).sort();
    const counts = labels.map(k => modelCount[k]);
    const maxCount = counts.length ? Math.max(...counts, 1) : 1;
    const yMax = Math.max(3, maxCount + 1);
    
    // DESTROY previous chart instance if exists
    if (ctx.chart) ctx.chart.destroy();
    
    // CRITICAL: ensure canvas container expands to full width
    const canvasElem = ctx.canvas;
    canvasElem.style.width = '100%';
    canvasElem.style.maxWidth = '100%';
    
    return new Chart(ctx, {
      type: 'bar',
      data: { labels, datasets: [{ label: titleLabel, data: counts, backgroundColor: barColor, borderRadius: 4 }] },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: { 
          legend: { 
            display: true, 
            position: 'top',
            labels: {
              font: { family: "'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif", size: 12, weight: 'bold' }
            }
          }, 
          datalabels: { 
            color: '#1a2634', 
            anchor: 'end', 
            align: 'top', 
            formatter: (value) => value > 0 ? value : '',
            font: { family: "'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif", weight: 'bold', size: 11 }
          },
          tooltip: {
            bodyFont: { family: "'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif", size: 12 },
            titleFont: { family: "'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif", weight: 'bold', size: 13 }
          }
        },
        scales: { 
          y: { 
            beginAtZero: true, 
            max: yMax, 
            ticks: { stepSize: 1, precision: 0, font: { family: "'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif", size: 11 } },
            title: { display: true, text: 'Number of Vehicles', font: { family: "'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif", size: 11, weight: 'bold' } }
          },
          x: { 
            ticks: { 
              autoSkip: false,
              maxRotation: 45,
              minRotation: 35,
              font: { family: "'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif", size: 10, weight: '500' }
            },
            title: { display: true, text: 'Model (CC)', font: { family: "'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif", size: 11, weight: 'bold' } }
          }
        },
        layout: {
          padding: {
            left: 10,
            right: 10,
            top: 20,
            bottom: 10
          }
        }
      },
      plugins: [ChartDataLabels]
    });
  }

  function refreshCharts(data) {
    const availableCtx = document.getElementById('availableChart').getContext('2d');
    availableChart = renderStatusChart(availableCtx, data, 'available', 'Available Stock', '#007bff');
    
    const reservedCtx = document.getElementById('reservedChart').getContext('2d');
    reservedChart = renderStatusChart(reservedCtx, data, 'reserved', 'Reserved Vehicles', '#ffc107');
    
    const repossessedCtx = document.getElementById('repossessedChart').getContext('2d');
    repossessedChart = renderStatusChart(repossessedCtx, data, 'repossessed', 'Repossessed Vehicles', '#dc3545');
    
    const onthewayCtx = document.getElementById('onthewayChart').getContext('2d');
    onthewayChart = renderStatusChart(onthewayCtx, data, 'ontheway', 'On The Way', '#28a745');
    
    const ontheportCtx = document.getElementById('ontheportChart').getContext('2d');
    ontheportChart = renderStatusChart(ontheportCtx, data, 'ontheport', 'On The Port', '#17a2b8');
  }

  function updateStats(cache) {
    let available=0, ontheway=0, ontheport=0, reserved=0, repossessed=0;
    Object.values(cache).forEach(v => {
      const s = getNormalizedStatus(v);
      if(s === 'available') available++;
      else if(s === 'ontheway') ontheway++;
      else if(s === 'ontheport') ontheport++;
      else if(s === 'reserved') reserved++;
      else if(s === 'repossessed') repossessed++;
    });
    availableEl.textContent = `${available} AVAILABLE`;
    onthewayEl.textContent = `${ontheway} ON THE WAY`;
    ontheportEl.textContent = `${ontheport} ON THE PORT`;
    reservedEl.textContent = `${reserved} RESERVED`;
    repossessedEl.textContent = `${repossessed} REPOSSESSED`;
  }

  // ---------- SEARCH logic ----------
  function normalizeSearchString(str) { return (str || '').toString().toLowerCase().replace(/[\s\-_\.]/g, ''); }
  function renderVehicleSearchResult(vehicle) {
    const container = document.getElementById('searchResultContainer');
    if (!vehicle) { container.innerHTML = `<div class="no-result"><i class="fas fa-exclamation-triangle"></i> Vehicle not found</div>`; return; }
    const statusRaw = getNormalizedStatus(vehicle);
    let displayStatus = statusRaw.toUpperCase();
    let badgeClass = 'badge-available';
    if(statusRaw === 'ontheway') badgeClass='badge-ontheway';
    else if(statusRaw === 'ontheport') badgeClass='badge-ontheport';
    else if(statusRaw === 'reserved') badgeClass='badge-reserved';
    else if(statusRaw === 'repossessed') badgeClass='badge-repossessed';
    else if(statusRaw === 'sold') badgeClass='badge-sold';
    const chassis = vehicle.chassis || 'N/A';
    const regno = vehicle.regno || 'N/A';
    const html = `<div class="search-result-card"><div class="result-header"><h3>Vehicle Details</h3><div class="result-badge ${badgeClass}">${displayStatus}</div></div>
    <div class="result-details-grid"><div class="detail-item"><span class="detail-label">CHASSIS</span><span class="detail-value">${chassis}</span></div>
    <div class="detail-item"><span class="detail-label">REG NO.</span><span class="detail-value">${regno}</span></div>
    <div class="detail-item"><span class="detail-label">BRAND/MODEL</span><span class="detail-value">${vehicle.brand || ''} ${vehicle.model || ''}</span></div>
    <div class="detail-item"><span class="detail-label">COLOR</span><span class="detail-value">${vehicle.color || '—'}</span></div></div></div>`;
    container.innerHTML = html;
  }
  function searchVehicleByChassisOrReg(term) {
    if(!term.trim()) { document.getElementById('searchResultContainer').innerHTML = ''; return null; }
    const norm = normalizeSearchString(term);
    const found = vehicleArrayCache.find(v => normalizeSearchString(v.chassis) === norm || normalizeSearchString(v.regno) === norm);
    if(found) renderVehicleSearchResult(found);
    else document.getElementById('searchResultContainer').innerHTML = `<div class="no-result"><i class="fas fa-search-minus"></i> No match</div>`;
    return found;
  }

  // ---------- EXPORT with GROUPED order ----------
  function generateGroupedExcelReport() {
    const groupOrder = ['ontheway', 'ontheport', 'available', 'reserved', 'repossessed', 'sold'];
    const groupDisplayNames = {
      'ontheway': 'ON THE WAY',
      'ontheport': 'ON THE PORT',
      'available': 'AVAILABLE',
      'reserved': 'RESERVED',
      'repossessed': 'REPOSSESSED',
      'sold': 'SOLD'
    };
    
    const groups = {};
    groupOrder.forEach(g => { groups[g] = []; });
    vehicleArrayCache.forEach(vehicle => {
      const statusKey = getNormalizedStatus(vehicle);
      if (groups[statusKey]) groups[statusKey].push(vehicle);
      else groups['available'].push(vehicle);
    });
    
    const headers = [
      "status", "id", "receivingDate", "chassis", "engine", "brand", "model", "package", "shift", "drive",
      "fuel", "cc", "color", "modelYearMonth", "mileage", "supplier", "consignee", "location", "regno",
      "logbook", "remarks (Stock)", "soldDate", "soldType", "buyerName", "buyerId", "buyerPhone",
      "buyerPin", "remarks (Sold)", "insurance_agent", "insurance_type", "insurance_validFrom",
      "insurance_expiry", "insurance_remarks", "remarks (Insurance)"
    ];
    
    const wsData = [headers];
    
    function addVehicleRow(vehicle, displayStatus) {
      const receivingDateFmt = formatDisplayDate(vehicle.receivingDate || vehicle.dateAdded || vehicle.createdAt);
      const modelYearMonthRaw = vehicle.modelYearMonth || vehicle.year || '';
      const logbookVal = vehicle.logbook || vehicle.logbookStatus || '';
      const statusNorm = getNormalizedStatus(vehicle);
      const stockRemarks = (statusNorm === 'available' || statusNorm === 'ontheway' || statusNorm === 'ontheport') ? (vehicle.remarks || '') : '';
      const soldRemarks = statusNorm === 'sold' ? (vehicle.remarksSold || vehicle.soldRemarks || '') : '';
      const insuranceRemarks = vehicle.insurance_remarks || '';
      
      wsData.push([
        displayStatus, vehicle.id || '', receivingDateFmt, vehicle.chassis || '', vehicle.engine || '',
        vehicle.brand || '', vehicle.model || '', vehicle.package || '', vehicle.shift || '', vehicle.drive || '',
        vehicle.fuel || '', vehicle.cc || vehicle.ccValue || '', vehicle.color || '', modelYearMonthRaw,
        vehicle.mileage || '', vehicle.supplier || '', vehicle.consignee || '', vehicle.location || '',
        vehicle.regno || '', logbookVal, stockRemarks, vehicle.soldDate ? formatDisplayDate(vehicle.soldDate) : '',
        vehicle.soldType || '', vehicle.buyerName || '', vehicle.buyerId || '', vehicle.buyerPhone || '',
        vehicle.buyerPin || '', soldRemarks, vehicle.insurance_agent || '', vehicle.insurance_type || '',
        vehicle.insurance_validFrom ? formatDisplayDate(vehicle.insurance_validFrom) : '',
        vehicle.insurance_expiry ? formatDisplayDate(vehicle.insurance_expiry) : '',
        vehicle.insurance_remarks || '', insuranceRemarks
      ]);
    }
    
    for (const groupKey of groupOrder) {
      const vehiclesInGroup = groups[groupKey];
      if (vehiclesInGroup.length === 0) continue;
      
      const separatorRow = new Array(headers.length).fill('');
      separatorRow[0] = `★★★ ${groupDisplayNames[groupKey]} (${vehiclesInGroup.length} vehicles) ★★★`;
      wsData.push(separatorRow);
      
      vehiclesInGroup.forEach(vehicle => {
        addVehicleRow(vehicle, groupDisplayNames[groupKey]);
      });
      wsData.push(new Array(headers.length).fill(''));
    }
    
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(wsData);
    ws['!cols'] = [{wch:18},{wch:12},{wch:14},{wch:18},{wch:14},{wch:12},{wch:14},{wch:12},{wch:8},{wch:8},{wch:8},{wch:8},{wch:12},{wch:14},{wch:10},{wch:18},{wch:18},{wch:16},{wch:14},{wch:10},{wch:20},{wch:14},{wch:12},{wch:18},{wch:14},{wch:16},{wch:14},{wch:18},{wch:16},{wch:14},{wch:16},{wch:14},{wch:18},{wch:18}];
    XLSX.utils.book_append_sheet(wb, ws, "Vehicles_Grouped");
    const fileName = `LIZAZ_Vehicles_Grouped_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.xlsx`;
    XLSX.writeFile(wb, fileName);
  }

  // --- Password popup logic for hidden button ---
  function showExportPasswordPopup() {
    exportPasswordInput.value = '';
    exportPasswordError.style.display = 'none';
    exportPopup.style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }
  function closeExportPopup() {
    exportPopup.style.display = 'none';
    document.body.style.overflow = '';
  }
  function verifyAndExport() {
    const pwd = exportPasswordInput.value;
    if (pwd === REQUIRED_PASSWORD) {
      closeExportPopup();
      if (vehicleArrayCache.length === 0) {
        showAlert('No vehicle data available to export.', 'Export Error');
        return;
      }
      generateGroupedExcelReport();
      showAlert('✅ Vehicle report exported', 'Export Ready');
    } else {
      exportPasswordError.style.display = 'block';
      exportPasswordInput.value = '';
      exportPasswordInput.focus();
    }
  }

  hiddenExportBtn.addEventListener('click', showExportPasswordPopup);
  submitExport.addEventListener('click', verifyAndExport);
  cancelExport.addEventListener('click', closeExportPopup);
  exportPasswordInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') verifyAndExport(); });
  exportPopup.addEventListener('click', (e) => { if(e.target === exportPopup) closeExportPopup(); });

  // ---------- Firebase & Dashboard ----------
  onValue(vehiclesRef, (snapshot) => {
    allVehiclesCache = snapshot.val() || {};
    vehicleArrayCache = Object.entries(allVehiclesCache).map(([id, v]) => ({ ...v, id }));
    updateStats(allVehiclesCache);
    refreshCharts(allVehiclesCache);

    const searchInputField = document.getElementById('searchInput');
    if (searchInputField.value.trim() !== "") {
      searchVehicleByChassisOrReg(searchInputField.value);
    }
  });

  // search event listeners
  document.getElementById('searchBtn').addEventListener('click', () => {
    const term = document.getElementById('searchInput').value;
    searchVehicleByChassisOrReg(term);
  });
  document.getElementById('clearSearchBtn').addEventListener('click', () => {
    document.getElementById('searchInput').value = '';
    document.getElementById('searchResultContainer').innerHTML = '';
  });
  document.getElementById('searchInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') document.getElementById('searchBtn').click();
  });
</script>
