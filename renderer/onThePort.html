    <script type="module">
      import { db, ref, onValue, set, remove, get, update } from '../firebase.js';

      const onThePortList = document.getElementById('onThePortList');
      const supplierButtonsDiv = document.getElementById('supplierButtons');
      const shipNameButtonsDiv = document.getElementById('shipNameButtons');
      const stockCount = document.getElementById('stockCount');
      const searchBar = document.getElementById('searchBar');
      const clearSearch = document.getElementById("clearSearch");
      const activeFilters = document.getElementById('activeFilters');
      const filterDescription = document.getElementById('filterDescription');
      const clearAllFilters = document.getElementById('clearAllFilters');
      const vehicleFormPopup = document.getElementById('vehicleFormPopup');
      const completeVehicleForm = document.getElementById('completeVehicleForm');
      
      let vehiclesData = {};
      let currentSupplierFilter = '';
      let currentShipFilter = '';
      let searchQuery = '';
      let pendingVehicleToMove = null;
      let pendingVehicleId = null;
      let brands = {};
      let shipNamesList = [];

      const popupReceivingDate = document.getElementById('popupReceivingDate');
      const popupConsignee = document.getElementById('popupConsignee');
      const popupSupplier = document.getElementById('popupSupplier');
      const popupChassis = document.getElementById('popupChassis');
      const popupEngine = document.getElementById('popupEngine');
      const popupBrand = document.getElementById('popupBrand');
      const popupModel = document.getElementById('popupModel');
      const popupCc = document.getElementById('popupCc');
      const popupColor = document.getElementById('popupColor');
      const popupPackage = document.getElementById('popupPackage');
      const popupFuel = document.getElementById('popupFuel');
      const popupShift = document.getElementById('popupShift');
      const popupDrive = document.getElementById('popupDrive');
      const popupMileage = document.getElementById('popupMileage');
      const popupLocation = document.getElementById('popupLocation');
      const popupRegno = document.getElementById('popupRegno');
      const popupLogbook = document.getElementById('popupLogbook');
      const popupRemarks = document.getElementById('popupRemarks');

      function showAlert(message, title = "Alert") {
        return new Promise(resolve => {
          const alert = document.getElementById('customAlert');
          const alertTitle = document.getElementById('alertTitle');
          const alertMessage = document.getElementById('alertMessage');
          const alertOkButton = document.getElementById('alertOkButton');
          
          alertTitle.textContent = title;
          alertMessage.textContent = message;
          alertOkButton.textContent = 'OK';
          
          alert.style.display = 'flex';
          
          const closeAlert = () => {
            alert.style.display = 'none';
            resolve();
          };
          
          alertOkButton.onclick = closeAlert;
          alert.onclick = (e) => {
            if (e.target === alert) closeAlert();
          };
        });
      }

      function showConfirm(message, title = "Confirm") {
        return new Promise(resolve => {
          const alert = document.getElementById('customAlert');
          const alertTitle = document.getElementById('alertTitle');
          const alertMessage = document.getElementById('alertMessage');
          const alertOkButton = document.getElementById('alertOkButton');
          
          alertTitle.textContent = title;
          alertMessage.textContent = message;
          alertOkButton.textContent = 'Confirm';
          
          alert.style.display = 'flex';
          
          const closeAlert = (result) => {
            alert.style.display = 'none';
            alertOkButton.textContent = 'OK';
            resolve(result);
          };
          
          alertOkButton.onclick = () => closeAlert(true);
          
          alert.onclick = (e) => {
            if (e.target === alert) closeAlert(false);
          };
        });
      }

      function escapeRegExp(string) {
        return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      }

      function highlight(text, query) {
        if (!query) return text;
        const pattern = escapeRegExp(query);
        const regex = new RegExp(`(${pattern})`, 'gi');
        return (text + '').replace(regex, '<span class="highlight-search">$1</span>');
      }

      function formatDisplayDate(raw) {
        if (!raw) return null;
        if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) {
          const d = new Date(raw);
          if (!isNaN(d.getTime())) {
            const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
            return `${String(d.getDate()).padStart(2,'0')} ${months[d.getMonth()]} ${String(d.getFullYear()).slice(2)}`;
          }
        }
        const parsed = new Date(raw);
        if (!isNaN(parsed.getTime())) {
          const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
          return `${String(parsed.getDate()).padStart(2,'0')} ${months[parsed.getMonth()]} ${String(parsed.getFullYear()).slice(2)}`;
        }
        return raw;
      }

      function formatDateForExcel(raw) {
        if (!raw) return '';
        if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) {
          const d = new Date(raw);
          if (!isNaN(d.getTime())) {
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const year = String(d.getFullYear()).slice(2);
            return `${day}-${month}-${year}`;
          }
        }
        const parsed = new Date(raw);
        if (!isNaN(parsed.getTime())) {
          const day = String(parsed.getDate()).padStart(2, '0');
          const month = String(parsed.getMonth() + 1).padStart(2, '0');
          const year = String(parsed.getFullYear()).slice(2);
          return `${day}-${month}-${year}`;
        }
        return raw;
      }

      function getStatusOptions(currentStatus) {
        if (currentStatus === 'ontheport') {
          return [
            { value: 'ontheport', text: 'ON THE PORT', selected: true },
            { value: 'available', text: 'AVAILABLE' }
          ];
        }
        return [
          { value: 'available', text: 'AVAILABLE', selected: true }
        ];
      }

      function loadShipNames() {
        onValue(ref(db, 'essentials/ship_name'), snap => {
          const data = snap.val() || {};
          shipNamesList = Object.values(data).map(item => item.name || item).filter(n => n && n.trim()).sort();
          renderShipNameButtons();
        });
      }

      function renderSupplierButtons() {
        supplierButtonsDiv.innerHTML = "";
        const portVehicles = Object.values(vehiclesData || {}).filter(v => v.status === 'ontheport');
        
        const allSuppliersBtn = document.createElement("button");
        allSuppliersBtn.textContent = "ALL SUPPLIERS";
        allSuppliersBtn.onclick = () => {
          currentSupplierFilter = "";
          renderList();
          renderSupplierButtons();
          renderShipNameButtons();
        };
        if (!currentSupplierFilter) allSuppliersBtn.classList.add("filter-active-supplier");
        supplierButtonsDiv.appendChild(allSuppliersBtn);

        const suppliersSet = new Set();
        portVehicles.forEach(v => {
          const supplier = (v.supplier || '').toString().trim().toUpperCase();
          if (supplier) suppliersSet.add(supplier);
        });
        const sortedSuppliers = Array.from(suppliersSet).sort((a,b) => a.localeCompare(b));
        
        sortedSuppliers.forEach(supplier => {
          const btn = document.createElement("button");
          btn.textContent = supplier;
          if (currentSupplierFilter === supplier) btn.classList.add("filter-active-supplier");
          btn.onclick = () => {
            currentSupplierFilter = supplier;
            renderList();
            renderSupplierButtons();
            renderShipNameButtons();
          };
          supplierButtonsDiv.appendChild(btn);
        });
      }

      function renderShipNameButtons() {
        shipNameButtonsDiv.innerHTML = "";
        
        let portVehicles = Object.values(vehiclesData || {}).filter(v => v.status === 'ontheport');
        
        if (currentSupplierFilter) {
          portVehicles = portVehicles.filter(v => (v.supplier || '').toString().trim().toUpperCase() === currentSupplierFilter);
        }
        
        const allShipsBtn = document.createElement("button");
        allShipsBtn.textContent = "ALL SHIPS";
        allShipsBtn.onclick = () => {
          currentShipFilter = "";
          renderList();
          renderShipNameButtons();
        };
        if (!currentShipFilter) allShipsBtn.classList.add("filter-active");
        shipNameButtonsDiv.appendChild(allShipsBtn);

        const shipNames = [...new Set(portVehicles
          .map(v => (v?.shipName || '').toString().trim().toUpperCase())
          .filter(Boolean))]
          .sort((a,b) => a.localeCompare(b));

        shipNames.forEach(name => {
          const btn = document.createElement("button");
          btn.textContent = name;
          if (currentShipFilter === name) btn.classList.add("filter-active");
          btn.onclick = () => {
            currentShipFilter = name;
            renderList();
            renderShipNameButtons();
          };
          shipNameButtonsDiv.appendChild(btn);
        });
      }

      searchBar.addEventListener("input", () => {
        searchQuery = searchBar.value.trim().toLowerCase();
        clearSearch.style.display = searchQuery ? "block" : "none";
        renderList();
      });

      clearSearch.onclick = () => {
        searchBar.value = "";
        searchQuery = "";
        clearSearch.style.display = "none";
        renderList();
      };

      function updateActiveFiltersDisplay() {
        const filters = [];
        if (currentSupplierFilter) filters.push(`Supplier: ${currentSupplierFilter}`);
        if (currentShipFilter) filters.push(`Ship Name: ${currentShipFilter}`);
        if (searchQuery) filters.push(`Search: "${searchQuery}"`);
        
        if (filters.length > 0) {
          filterDescription.textContent = `Active filters: ${filters.join(' | ')}`;
          activeFilters.style.display = 'block';
        } else {
          activeFilters.style.display = 'none';
        }
      }

      async function updateShipmentDate(vehicleId, newDate) {
        try {
          await update(ref(db, `vehicles/${vehicleId}`), {
            shipmentDate: newDate,
            updatedAt: Date.now()
          });
          await showAlert(`Shipment date updated successfully!`, 'Success');
          renderList();
        } catch (error) {
          console.error('Error updating shipment date:', error);
          await showAlert('Error updating shipment date. Please try again.', 'Error');
        }
      }

      function loadEssentialData() {
        onValue(ref(db, 'essentials/brand'), snap => {
          brands = snap.val() || {};
          popupBrand.innerHTML = '<option value="">SELECT BRAND</option>';
          Object.values(brands).map(b => b.name).sort().forEach(name => {
            const opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name.toUpperCase();
            popupBrand.appendChild(opt);
          });
        });

        onValue(ref(db, 'essentials/consignee'), snap => {
          const data = snap.val() || {};
          popupConsignee.innerHTML = '<option value="">SELECT CONSIGNEE</option>';
          Object.values(data).map(v => v.name || v).filter(n => n).sort().forEach(name => {
            const opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name.toUpperCase();
            popupConsignee.appendChild(opt);
          });
        });

        onValue(ref(db, 'essentials/supplier'), snap => {
          const data = snap.val() || {};
          popupSupplier.innerHTML = '<option value="">SELECT SUPPLIER</option>';
          Object.values(data).map(v => v.name || v).filter(n => n).sort().forEach(name => {
            const opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name.toUpperCase();
            popupSupplier.appendChild(opt);
          });
        });

        onValue(ref(db, 'essentials/color'), snap => {
          const data = snap.val() || {};
          popupColor.innerHTML = '<option value="">SELECT COLOR</option>';
          Object.values(data).map(v => v.name || v).filter(n => n).sort().forEach(name => {
            const opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name.toUpperCase();
            popupColor.appendChild(opt);
          });
        });

        onValue(ref(db, 'essentials/location'), snap => {
          const data = snap.val() || {};
          popupLocation.innerHTML = '<option value="">SELECT LOCATION</option>';
          Object.values(data).map(v => v.name || v).filter(n => n).sort().forEach(name => {
            const opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name.toUpperCase();
            popupLocation.appendChild(opt);
          });
        });
        
        loadShipNames();
      }

      popupBrand.addEventListener('change', () => {
        const brandName = popupBrand.value;
        popupModel.innerHTML = '<option value="">SELECT MODEL</option>';
        popupCc.innerHTML = '<option value="">SELECT CC</option>';
        if (!brandName) return;
        const brand = Object.values(brands).find(b => b.name === brandName);
        if (brand && brand.models) {
          Object.keys(brand.models).sort().forEach(m => {
            const opt = document.createElement('option');
            opt.value = m;
            opt.textContent = m.toUpperCase();
            popupModel.appendChild(opt);
          });
        }
      });

      popupModel.addEventListener('change', async () => {
        const modelName = popupModel.value;
        popupCc.innerHTML = '<option value="">SELECT CC</option>';
        if (!modelName) return;
        try {
          const modelSnap = await get(ref(db, `essentials/model/${modelName}/cc`));
          if (modelSnap.exists()) {
            const ccs = modelSnap.val() || {};
            Object.keys(ccs).sort((a,b)=>Number(a)-Number(b)).forEach(cc => {
              const opt = document.createElement('option');
              opt.value = cc;
              opt.textContent = cc;
              popupCc.appendChild(opt);
            });
          }
        } catch (error) {
          console.error('Error loading CC:', error);
        }
      });

      function showVehicleForm(vehicle, vehicleId) {
        const today = new Date().toISOString().split('T')[0];
        popupReceivingDate.value = today;
        popupReceivingDate.max = today;
        popupChassis.value = vehicle.chassis || '';
        popupEngine.value = vehicle.engine || '';
        popupBrand.value = vehicle.brand || '';
        popupColor.value = vehicle.color || '';
        popupSupplier.value = vehicle.supplier || '';
        popupPackage.value = vehicle.package || 'STANDARD';
        if (vehicle.cc) popupCc.value = vehicle.cc;
        if (vehicle.fuel) popupFuel.value = vehicle.fuel;
        if (vehicle.shift) popupShift.value = vehicle.shift;
        if (vehicle.drive) popupDrive.value = vehicle.drive;
        
        if (vehicle.brand) {
          popupBrand.dispatchEvent(new Event('change'));
          setTimeout(() => {
            if (vehicle.model) {
              popupModel.value = vehicle.model;
              popupModel.dispatchEvent(new Event('change'));
              setTimeout(() => {
                if (vehicle.cc) {
                  let ccExists = false;
                  for (let i = 0; i < popupCc.options.length; i++) {
                    if (popupCc.options[i].value === vehicle.cc) { ccExists = true; break; }
                  }
                  if (ccExists) popupCc.value = vehicle.cc;
                  else {
                    const option = document.createElement('option');
                    option.value = vehicle.cc;
                    option.textContent = vehicle.cc;
                    popupCc.appendChild(option);
                    popupCc.value = vehicle.cc;
                  }
                }
              }, 200);
            }
          }, 100);
        }
        vehicleFormPopup.style.display = 'flex';
        pendingVehicleToMove = vehicle;
        pendingVehicleId = vehicleId;
      }

      async function moveToStockWithDetails(vehicleId, vehicleData, formData) {
        try {
          const originalId = vehicleData.id || vehicleId;
          const updatedVehicle = { ...vehicleData, id: originalId, status: 'available', updatedAt: Date.now(), receivingDate: formData.receivingDate, consignee: formData.consignee, supplier: formData.supplier, chassis: formData.chassis, engine: formData.engine, brand: formData.brand, model: formData.model, cc: formData.cc, color: formData.color, package: formData.package, fuel: formData.fuel, shift: formData.shift, drive: formData.drive, mileage: formData.mileage, location: formData.location, regno: formData.regno || null, logbook: formData.logbook || null, remarks: formData.remarks || null, statusHistory: [...(vehicleData.statusHistory || []), { status: 'available', date: new Date().toISOString().split('T')[0], timestamp: Date.now(), fromModule: 'onThePort' }] };
          await update(ref(db, `vehicles/${vehicleId}`), updatedVehicle);
          vehicleFormPopup.style.display = 'none';
          completeVehicleForm.reset();
          pendingVehicleToMove = null;
          pendingVehicleId = null;
          await showAlert(`Vehicle moved to AVAILABLE stock successfully!\nVehicle ID: ${originalId}`, 'Success');
          renderList();
          setTimeout(() => { window.location.href = 'stock.html'; }, 1500);
        } catch (error) { console.error('Error moving vehicle:', error); await showAlert('Error moving vehicle. Please try again.', 'Error'); }
      }

      function fetchVehicles() {
        onValue(ref(db, 'vehicles'), snap => {
          const allVehicles = snap.val() || {};
          const portVehicles = {};
          Object.keys(allVehicles).forEach(key => { 
            if (allVehicles[key].status === 'ontheport') portVehicles[key] = allVehicles[key];
          });
          vehiclesData = portVehicles;
          renderSupplierButtons();
          renderShipNameButtons();
          renderList();
        });
      }

      async function updateShipName(vehicleId, oldShipName, newShipName) {
        try {
          await update(ref(db, `vehicles/${vehicleId}`), { shipName: newShipName.toUpperCase(), updatedAt: Date.now() });
          await showAlert(`Ship name updated from "${oldShipName}" to "${newShipName}" successfully!`, 'Success');
          renderList();
          renderSupplierButtons();
          renderShipNameButtons();
        } catch (error) { console.error('Error updating ship name:', error); await showAlert('Error updating ship name. Please try again.', 'Error'); }
      }

      // Helper function to get filtered vehicles based on current filters
      function getFilteredVehicles() {
        let filtered = Object.values(vehiclesData || {});
        if (currentSupplierFilter) {
          filtered = filtered.filter(v => v && (v.supplier || '').toString().trim().toUpperCase() === currentSupplierFilter);
        }
        if (currentShipFilter) {
          filtered = filtered.filter(v => v && (v.shipName || '').toString().trim().toUpperCase() === currentShipFilter);
        }
        if (searchQuery) {
          const searchTerms = searchQuery.split('+').map(term => term.trim().toLowerCase()).filter(term => term.length > 0);
          filtered = filtered.filter(v => {
            const searchableFields = [v.brand, v.model, v.supplier, v.shipName, v.chassis, v.color, v.modelYearMonth, v.package, v.id, v.status, v.shipmentDate];
            const searchableText = searchableFields.map(field => String(field || '').toLowerCase()).join(' ');
            return searchTerms.every(term => searchableText.includes(term));
          });
        }
        return filtered;
      }

      function renderList() {
        onThePortList.innerHTML = '';
        let filteredVehicles = getFilteredVehicles();
        
        filteredVehicles.sort((a, b) => { const modelA = (a.model || '').toUpperCase(); const modelB = (b.model || '').toUpperCase(); return modelA < modelB ? -1 : modelA > modelB ? 1 : 0; });
        stockCount.textContent = `(${filteredVehicles.length})`;
        updateActiveFiltersDisplay();
        if (filteredVehicles.length === 0) { onThePortList.innerHTML = '<p>No vehicles on port found.</p>'; return; }

        filteredVehicles.forEach(v => {
          const key = Object.keys(vehiclesData).find(k => vehiclesData[k] === v);
          const statusOptions = getStatusOptions(v.status || 'ontheport');
          const div = document.createElement('div');
          div.className = 'vehicle-box';
          const shipName = v.shipName || '';
          const shipmentDateRaw = v.shipmentDate || '';
          const vehicleId = key || '';
          const supplier = v.supplier || '';
          const chassis = v.chassis || '';
          const color = v.color || '';
          const year = v.modelYearMonth ? v.modelYearMonth.split('-')[0] : '';
          const packageType = v.package || '';
          let shipOptions = '<option value="">SELECT VESSEL</option>';
          shipNamesList.forEach(name => { const selected = (name.toUpperCase() === shipName.toUpperCase()) ? 'selected' : ''; shipOptions += `<option value="${name}" ${selected}>${name.toUpperCase()}</option>`; });
          
          div.innerHTML = `
            <div class="vehicle-details">
              <strong>${highlight((v.brand || '').toString().toUpperCase(), searchQuery)} <span class="model-name-red">${highlight((v.model || '').toString().toUpperCase(), searchQuery)}</span><span class="port-badge">⚓ ON THE PORT</span></strong>
              <div class="port-info">
                <h4>📦 SHIPMENT INFORMATION</h4>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                  <div><b>SHIP NAME:</b> <select class="ship-name-select" data-id="${key}" data-current-ship="${shipName}">${shipOptions}</select></div>
                  <div><b>SHIPMENT DATE:</b> <input type="date" class="shipment-date-input" data-id="${key}" value="${shipmentDateRaw || ''}" min="2000-01-01" max="2999-12-31" style="width: 100%;" /></div>
                </div>
              </div>
              <div class="vehicle-info-grid">
                <div><b>VEHICLE ID:</b> ${highlight(vehicleId.toString().toUpperCase(), searchQuery)}</div>
                <div><b>SUPPLIER:</b> ${highlight(supplier.toString().toUpperCase(), searchQuery)}</div>
                ${chassis ? `<div><b>CHASSIS NO:</b> ${highlight(chassis.toString().toUpperCase(), searchQuery)}</div>` : ''}
                ${color ? `<div><b>COLOR:</b> ${highlight(color.toString().toUpperCase(), searchQuery)}</div>` : ''}
                ${year ? `<div><b>YEAR:</b> ${highlight(year, searchQuery)}</div>` : ''}
                ${packageType ? `<div><b>PACKAGE:</b> ${highlight(packageType.toString().toUpperCase(), searchQuery)}</div>` : ''}
                <div><b>STATUS:</b> <select class="statusSelect" data-id="${key}" data-status="${v.status || 'ontheport'}">${statusOptions.map(option => `<option value="${option.value}" ${option.selected ? 'selected' : ''}>${option.text}</option>`).join('')}</select></div>
              </div>
            </div>
          `;
          onThePortList.appendChild(div);
          
          const shipSelect = div.querySelector('.ship-name-select');
          if (shipSelect) {
            shipSelect.addEventListener('change', async (e) => {
              e.stopPropagation();
              const newShipName = e.target.value;
              const vid = e.target.dataset.id;
              const oldShipName = e.target.dataset.currentShip;
              if (!newShipName) return;
              if (newShipName.toUpperCase() === oldShipName.toUpperCase()) return;
              const confirm = await showConfirm(`Change ship name from "${oldShipName}" to "${newShipName}"?`, 'Confirm Change');
              if (confirm) await updateShipName(vid, oldShipName, newShipName);
              else e.target.value = oldShipName;
            });
          }
          
          const dateInput = div.querySelector('.shipment-date-input');
          if (dateInput) {
            dateInput.addEventListener('change', async (e) => {
              e.stopPropagation();
              const newDate = e.target.value;
              const vid = e.target.dataset.id;
              if (!newDate) return;
              const confirm = await showConfirm(`Update shipment date to ${newDate}?`, 'Confirm Date Change');
              if (confirm) await updateShipmentDate(vid, newDate);
              else e.target.value = v.shipmentDate || '';
            });
          }
        });
      }

      onThePortList.addEventListener('change', async (e) => {
        if (!e.target.classList.contains('statusSelect')) return;
        const vehicleId = e.target.dataset.id;
        const newStatus = e.target.value;
        if (!vehicleId || !newStatus) return;
        const vehicleRef = ref(db, `vehicles/${vehicleId}`);
        const snap = await get(vehicleRef);
        if (!snap.exists()) return;
        const vehicle = snap.val();
        if (newStatus === 'ontheport') { e.target.value = 'ontheport'; return; }
        if (newStatus === 'available') { showVehicleForm(vehicle, vehicleId); e.target.value = 'ontheport'; }
      });

      completeVehicleForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!pendingVehicleToMove || !pendingVehicleId) return;
        const requiredFields = [popupReceivingDate, popupConsignee, popupSupplier, popupChassis, popupEngine, popupBrand, popupModel, popupCc, popupColor, popupFuel, popupShift, popupDrive, popupMileage, popupLocation];
        for (const field of requiredFields) { if (!field.value) { await showAlert(`Please fill in all required fields`, 'Error'); return; } }
        const chassisValue = popupChassis.value.trim().toUpperCase();
        const engineValue = popupEngine.value.trim().toUpperCase();
        if (chassisValue === engineValue) { await showAlert(`Chassis Number and Engine Number cannot be the same.`, 'Error'); popupEngine.focus(); return; }
        const formData = { receivingDate: popupReceivingDate.value, consignee: popupConsignee.value.trim().toUpperCase(), supplier: popupSupplier.value.trim().toUpperCase(), chassis: chassisValue, engine: engineValue, brand: popupBrand.value.trim().toUpperCase(), model: popupModel.value.trim().toUpperCase(), cc: popupCc.value, color: popupColor.value.trim().toUpperCase(), package: popupPackage.value.toUpperCase(), fuel: popupFuel.value.trim().toUpperCase(), shift: popupShift.value.trim().toUpperCase(), drive: popupDrive.value.trim().toUpperCase(), mileage: Number(popupMileage.value), location: popupLocation.value.trim().toUpperCase(), regno: popupRegno.value.trim().toUpperCase() || null, logbook: popupLogbook.value.trim().toUpperCase() || null, remarks: popupRemarks.value.trim().toUpperCase() || null };
        await moveToStockWithDetails(pendingVehicleId, pendingVehicleToMove, formData);
      });

      document.getElementById("closePopupBtn").addEventListener("click", () => { vehicleFormPopup.style.display = 'none'; pendingVehicleToMove = null; pendingVehicleId = null; completeVehicleForm.reset(); });
      
      // UPDATED DOWNLOAD BUTTON: Downloads ONLY filtered vehicles based on current supplier, ship, and search filters
      document.getElementById("downloadBtn").addEventListener("click", () => {
        const filteredVehicles = getFilteredVehicles();
        
        if (filteredVehicles.length === 0) {
          showAlert('No vehicles match the current filters. Nothing to download.', 'No Data');
          return;
        }
        
        const sortedVehicles = [...filteredVehicles].sort((a, b) => { 
          const dateA = a.shipmentDate || ''; 
          const dateB = b.shipmentDate || ''; 
          if (dateA !== dateB) return dateA.localeCompare(dateB); 
          const vesselA = (a.shipName || '').toUpperCase(); 
          const vesselB = (b.shipName || '').toUpperCase(); 
          return vesselA.localeCompare(vesselB); 
        });
        
        const wsData = [["SHIPMENT DATE", "VESSEL", "NO.", "NAME", "MODEL", "CHASSIS", "YEAR", "COLOR"]];
        sortedVehicles.forEach(v => { 
          wsData.push([ 
            v.shipmentDate ? formatDateForExcel(v.shipmentDate) : '', 
            (v.shipName || '').toUpperCase(), 
            (v.id || v.vehicleId || '').toString(), 
            (v.brand || '').toUpperCase(), 
            (v.model || '').toUpperCase(), 
            v.chassis || '', 
            v.modelYearMonth ? v.modelYearMonth.split('-')[0] : '', 
            (v.color || '').toUpperCase() 
          ]); 
        });
        
        const wb = XLSX.utils.book_new(); 
        const ws = XLSX.utils.aoa_to_sheet(wsData); 
        ws['!cols'] = [{ wch: 12 }, { wch: 25 }, { wch: 10 }, { wch: 15 }, { wch: 20 }, { wch: 18 }, { wch: 8 }, { wch: 12 }]; 
        XLSX.utils.book_append_sheet(wb, ws, "OnThePort"); 
        
        // Build filename with filter indicators for clarity
        let filterSuffix = '';
        if (currentSupplierFilter) filterSuffix += `_${currentSupplierFilter}`;
        if (currentShipFilter) filterSuffix += `_${currentShipFilter}`;
        if (searchQuery) filterSuffix += `_filtered`;
        XLSX.writeFile(wb, `OnThePort_Report${filterSuffix}_${new Date().toISOString().split('T')[0]}.xlsx`);
        
        showAlert(`Downloaded ${filteredVehicles.length} vehicle(s) matching current filters.`, 'Download Complete');
      });
      
      clearAllFilters.addEventListener('click', () => { currentSupplierFilter = ''; currentShipFilter = ''; searchQuery = ''; searchBar.value = ''; clearSearch.style.display = 'none'; renderSupplierButtons(); renderShipNameButtons(); renderList(); });
      loadEssentialData();
      fetchVehicles();
    </script>
  </div>
</body>
</html>
